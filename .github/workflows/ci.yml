name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Ruff lint
        run: ruff check . --select E,F,I --ignore E501

      - name: Syntax check (all .py files)
        run: python -c "
          import ast, pathlib, sys
          errors = []
          for f in sorted(pathlib.Path('.').rglob('*.py')):
              if '.git' in str(f): continue
              try: ast.parse(f.read_text())
              except SyntaxError as e: errors.append(f'{f}: {e}')
          if errors:
              print('\n'.join(errors)); sys.exit(1)
          print(f'All {len(list(pathlib.Path(\".\").rglob(\"*.py\")))} files passed')
          "

      - name: Run tests
        run: pytest tests/ -v --tb=short
