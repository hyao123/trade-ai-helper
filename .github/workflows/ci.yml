name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Ruff lint
        run: ruff check . --select E,F,I --ignore E501

      - name: Syntax check (all .py files)
        run: |
          python - <<'PY'
          import ast
          import pathlib
          import sys

          errors = []
          files = sorted(pathlib.Path(".").rglob("*.py"))
          for file_path in files:
              if ".git" in file_path.parts:
                  continue
              try:
                  ast.parse(file_path.read_text())
              except SyntaxError as error:
                  errors.append(f"{file_path}: {error}")

          if errors:
              print("\n".join(errors))
              sys.exit(1)

          print(f"All {len(files)} files passed")
          PY

      - name: Run tests
        run: pytest tests/ -v --tb=short
